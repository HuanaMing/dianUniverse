<script>
//===============================================================================================環境變數===============================================================================================//
const canvas = document.getElementById('world');
const ctx = canvas.getContext('2d');
const canvasTerrain = document.getElementById('terrain');
const ctxTerrain = canvasTerrain.getContext('2d');
const infoDiv = document.getElementById('info');
const infoShift = document.getElementById('infoShift');
const artControl = document.getElementById('artControl');
const terrainInput = document.getElementById('terrainInput');
const terrainBtn = document.getElementById('terrainBtn');
const restart = document.getElementById('restart');
//=============================================================================================環境變數結尾=============================================================================================//
//
//
//===============================================================================================工具函數===============================================================================================//
//算距離
function distance(a, b) {
  return Math.max(1, Math.hypot(a.x - b.x, a.y - b.y, (a.z || 0) - (b.z || 0)));
}
function random(min, max) {
  return min+Math.random()*(max-min);
}

//依種子碼生成亂數
function rand2 (x, y, seed = "Atlantis🦈") {
  let n = x * 19990208 + y * 20011208 + seed * 20230508;
  n = (n ^ (n >> 2)) * 20221208;
  n = (n ^ (n >> 12));
  return (n >>> 0) / 4294967295;
}

//依亂數生成像素高度
function noise (x, y, seed = "Atlantis🦈") {
  let n = 0;
  for (const ch of seed) n += ch.codePointAt(0);
  const x0 = Math.floor(x);
  const y0 = Math.floor(y);
  const x1 = x0 + 1;
  const y1 = y0 + 1;
  
  const sx = ((x - x0) ** 2) * (3 - 2 * (x - x0));
  const sy = ((y - y0) ** 2) * (3 - 2 * (y - y0));
  
  const n00 = rand2(x0, y0, n);
  const n01 = rand2(x0, y1, n);
  const n10 = rand2(x1, y0, n);
  const n11 = rand2(x1, y1, n);
  
  const ix0 = n00 + (n10 - n00) * sx;
  const ix1 = n01 + (n11 - n01) * sx;
  return (ix0 + (ix1 - ix0) * sy);
}

//畫三角形
function drawFly(ctx, cx, cy, size) {
  ctx.beginPath();
  for (let i = 0; i < 3; i++) {
    const angle = Math.PI / 2 + i * (Math.PI * 2 / 3);
    const x = cx + Math.cos(angle) * size;
    const y = cy + Math.sin(angle) * size;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.stroke();
}

//畫正方形
function drawDig(ctx, cx, cy, size) {
  ctx.beginPath();
  for (let i = 0; i < 4; i++) {
    const angle = i * (Math.PI * 1 / 2);
    const x = cx + Math.cos(angle) * size;
    const y = cy + Math.sin(angle) * size;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.stroke();
}

//畫雙波浪
function drawSwim(ctx, cx, cy, width) {
  ctx.beginPath();
  const h = width * 0.15;
  ctx.moveTo(cx - width/2, cy);
  ctx.quadraticCurveTo(cx - width/4, cy - h, cx, cy);
  ctx.quadraticCurveTo(cx + width/4, cy + h, cx + width/2, cy);
  ctx.stroke();
}

//=============================================================================================工具函數結尾=============================================================================================//
//
//
//================================================================================================生產者================================================================================================//
//
//
class Food {
//============================================生產者生成============================================//
  constructor(f) {
    this.x = f.x;
    this.y = f.y;

    let ratio =  [];
    for (let i=0; i<21; i++) {
      const count = (foods.filter(f => f.z > (i-10)/10*canvasZ && f.z < (i-9)/10*canvasZ).length+1)/(foods.filter(f => f.z<canvasZ && f.z>-canvasZ).length+21);
      ratio.push(count);
    }

    let zRatio = 0;
    let p = Math.random();
    let z;

    for (let i=0; i<21; i++) {
      zRatio += ratio[i];
      if (zRatio >= p) {
        z = (i-10+Math.random()-0.5)/10*canvasZ;
        break;
      }
    }
    this.z = f.z ?? (z - noise(f.x * scale, f.y * scale, terrainInput.value));
    this.age = f.age || 0.208;
    this.last = f.last || Math.random() * 150;
    this.radius = ((this.last / 4.21) ** (1/3));
    this.maxAge = frame * 40;
    this.nutrition = 1;
    this.type = "food";
  }
//==========================================生產者生成結尾==========================================//
//
//
//============================================生產者受肉============================================//
  draw() {
    const t = 0.6 - 0.5 * (this.age / this.maxAge);
    ctx.fillStyle = this.color || `rgba(208, 208, 208, ${0.6 * t + 0.1208})`;
    
    const r = ((this.last / 4.21) ** (1/3));
    if (this.z > 0.5 * canvasZ) {
    // 空中 → 三角形
      ctx.beginPath();
      ctx.moveTo(this.x, this.y - (2 ** 0.5) * r);
      ctx.lineTo(this.x - r, this.y + r);
      ctx.lineTo(this.x + r, this.y + r);
      ctx.closePath();
      ctx.fill();

    } else if (this.z < -0.5 * canvasZ) {
    // 地下 → 正方形
      ctx.fillRect(this.x - r, this.y - r, 2 * r, 2 * r);

    } else {
    // 地面 → 圓形
      ctx.beginPath();
      ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}
//==========================================生產者受肉結尾==========================================//

class Egg {
//==============================================蛋生成==============================================//
  constructor(e) {
    this.x = e.x;
    this.y = e.y;
    this.z = e.z;
    this.attributes = e.attributes;
    this.hunt = e.hunt;
    this.parents = e.parents;
    this.parentSpecies1 = e.parentSpecies1;
    this.parentSpecies2 = e.parentSpecies2;
    this.bornAge = 5;
    this.age = e.age || 0;
  }
//============================================蛋生成結尾============================================//
//
//
//==============================================蛋時間==============================================//
  update() {
    this.age += 1 / frame;
    if (!selectedAgent) this.draw();
    if (selectedAgent && distance(this, selectedAgent) < selectedAgent.vision) this.draw();
    if (this.age >= this.bornAge) {
      agents.push(new Agent({
        x: this.x,
        y: this.y,
        z: this.z,
        attributes: this.attributes,
        parents: this.parents,
        parentSpecies1: this.parentSpecies1,
        parentSpecies2: this.parentSpecies2,
      }));
      return "born";
    }
  }
//============================================蛋時間結尾============================================//
//
//
//==============================================蛋受肉==============================================//
  draw() {
    const shellR = 4 + (this.attributes?.strength?? 0) / 5;
    const yolkR = Math.max(0.5, 0.4 + shellR * (this.bornAge - this.age) / this.bornAge);
//外圈
    ctx.beginPath();
    ctx.arc(this.x, this.y, shellR, 0, 2 * Math.PI);
    ctx.strokeStyle = "rgb(158, 158, 255)";
    ctx.lineWidth = 1;
    ctx.stroke();
    
//內圈
    ctx.beginPath();
    ctx.arc(this.x, this.y, yolkR, 0, 2 * Math.PI);
    ctx.strokeStyle = "rgb(255, 255, 255)";
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }
}
//============================================蛋受肉結尾============================================//
//
//
//================================================================================================蛋結尾================================================================================================//
//
//
//=================================================================================================點點=================================================================================================//
//
//
class Agent {
//=============================================點點生成=============================================//
  constructor(a={}) {
    this.x = a.x;
    this.y = a.y;
    this.vx = a.vx || 0;
    this.vy = a.vy || 0;
    this.lastX = a.lastX || this.x;
    this.lastY = a.lastY || this.y;
    this.shakeX = 0;
    this.shakeY = 0;
    this.type = "agent";

    this.attributes = a.attributes || {
      strength: Math.random() * 10,
      agility: Math.random() * 10,
      intelligence: Math.random() * 10, 
      endurance: Math.random() * 10,
    };
    
    this.abilities = a.abilities || {
      swim: false,
    };
    
    let s = this.attributes.strength;
    let i = this.attributes.intelligence;
    let ag = this.attributes.agility;
    let e = this.attributes.endurance;

    this.area = 16 * s; //面積
    this.radius = (this.area/Math.PI)**0.5; //半徑
    this.surface = 4*Math.PI * (this.radius**2)
    this.mass = (4.21/3)*Math.PI * (this.radius**3); //體積 & 質量

    this.maxZ = (ag + e - 2*s + 5) / 60 * i * canvasZ + this.radius; //飛行上限
    this.minZ = -(s + e - 2*ag + 5) / 60 * i * canvasZ - this.radius; //遁地下限
    if (this.maxZ < this.minZ) {
      const midZ = (this.maxZ + this.minZ)/2;
      this.maxZ = midZ;
      this.minZ = midZ;
    }
    this.z = a.z || Math.max(this.minZ, Math.min(this.maxZ, a.z));
    this.lastZ = a.lastZ || this.z;
    this.vz = a.vz || 0;
	  
    if (s > 4 && e > 4 && ag > 4 && Math.abs(s - ag) < 3) this.abilities.swim = true; //游泳
    this.hunt = a.hunt ?? Math.random();
    this.hunted = a.hunted ?? false;

    this.abilities.ignoreWat = this.abilities.swim;

    this.maxSatiety = this.mass / 3;
    this.satiety = a.satiety || this.maxSatiety * 2/3;
    this.starve = 2/200 * (this.mass/1000 + i/10); //每幀飢餓速度

    this.speed = 0.22 * Math.max(0.01, ((s*ag/e) / 25) / (this.mass/1000)); //加速度值
    this.moving = a.moving || 0; //速度值
    this.wanderTimer = s+ag+i+e;

    this.maxHeat = e * 25;//最高體溫(疲勞度)
    this.heat = a.heat || this.maxHeat * 3/5; //初始體溫
    this.heating = 1; //實際體溫增加速度 = heating*0.5*重量*(實際速度**2)*離地
    this.cooling = (0.0208 * this.surface / this.mass); //實際體溫散失速度 = cooling*海拔
    this.speedFactor = 1; //過熱時調整速度用
    this.heightFactor = 1; //離開適應區調整速度用

    this.age = a.age || 0.208;
    this.maxAge = 1 + this.mass; //壽命

    this.territory = this.radius + this.mass * ((s*s*ag/e)**(1/2)) / 25; //領地
    this.vision = 40 + this.radius + i * 50; //視野
    this.target = a.target || null; //設定目標用
    this.lastTarget = null;

    this.mode = "eat"; //eat/mate/escape
    this.prevMode = "eat";
    this.cooldown = a.cooldown || 0; //交配冷卻

    this.parents = [{}, {}]; //記錄親代
    this.id = a.id || Math.random().toString(36).slice(2); //幾乎獨一無二的36碼id
    this.species = `${this.maxZ > 0.5 * canvasZ ? "F":"N"}${this.minZ < -0.5 * canvasZ ? "D":"N"}${this.abilities.swim? "S":"N"}${this.hunt>0.5? "H":"N"}`; //同種才能交配
    this.parentSpecies1 = a.parentSpecies1 || "NNNN";
    this.parentSpecies2 = a.parentSpecies2 || "NNNN";
    this.newSpecies = !(this.species === this.parentSpecies1 || this.species === this.parentSpecies2);
    this.COD = null; 
    this.ate = false;
  }
//===========================================點點生成結尾===========================================//
//
//
//=============================================點點時間=============================================//
  update() {

//年齡
    this.age += 1/frame;

//計算每幀移動量
    this.moving = Math.hypot(this.lastX - this.x, this.lastY - this.y, this.lastZ - this.z);
    this.maxAge -= 0.0001*0.5*this.mass*(this.moving**1) * (1 + (this.z/canvasZ)**2);

//熱
    this.heat -= this.heat * 0.002023 + this.cooling * (1 + this.z/canvasZ);
    this.heat += this.heating * 0.5 *(this.moving ** 2) * (1 + (this.z/canvasZ)**2);

    if (this.heat > this.maxHeat * 2/3) this.speedFactor = (this.maxHeat - this.heat) / (this.maxHeat * 2/3);
    if (this.heat <= this.maxHeat * 2/3) {
      this.speedFactor = 1;
      this.shakeX = 0;
      this.shakeY = 0;
    }
    if (this.heat < this.maxHeat/20) {
      let dirX = (Math.random() - 0.5) >=0? 1: -1;
      let dirY = (Math.random() - 0.5) >=0? 1: -1;
      let amount = Math.random();

      this.shakeX = dirX * amount * 0.5*this.radius;
      this.shakeY = dirY * (1-amount) * 0.5*this.radius;
      const shakingMove = Math.hypot(this.shakeX, this.shakeY);
      this.satiety -= 0.00005 * 0.5*this.mass*(shakingMove**2) * (1 + (this.z/canvasZ)**2);
      this.heat += this.heating * 0.5 *(shakingMove ** 2) * (1 + (this.z/canvasZ)**2) ;
    };

//位置
    if (this.z > this.maxZ) this.heightFactor = 1-0.5*(this.z-this.maxZ)/canvasZ;
    else if (this.z < this.minZ) this.heightFactor = 1-0.5*(this.minZ-this.z)/canvasZ;
    else this.heightFactor = 1;

//飢餓
    this.satiety -= this.starve + 0.00005 * 0.5*this.mass*(this.moving**2) * (1 + (this.z/canvasZ)**2 );

//死亡	
    if (this.satiety <= 0) { this.COD = "hunger"; return false;}
    if (this.heat > this.maxHeat) { this.COD = "hot"; return false;}
    if (this.heat <= 0) { this.COD = "cold"; return false;}
    if (this.age >= this.maxAge) { this.COD = "old"; return false;}
    if (this.ate) { this.COD = "eat"; return false;}
    if (this.cooldown > 0) this.cooldown -= 1/frame;
    
    this.find();
    if (!selectedAgent) this.draw();
    if (selectedAgent && distance(this, selectedAgent) <= selectedAgent.vision) this.draw();

    return true;
  }
//===========================================點點時間結尾===========================================//
//
//
//=============================================點點眼腦=============================================//
//
//
  find() {
//==================紀錄上次狀態==================//
    this.lastTarget = this.target;
    if (this.target && this.target.type !== "wander" && !agents.includes(this.target) && !foods.includes(this.target)) {
      this.target = null;
    }
//================紀錄上次狀態結尾================//
//
//
//=====================找威脅=====================//
    const threats = [];
    for (const other of agents) {
      if (!isThreatAgent(this, other) && other.target !== this && other.mode !== "eat") continue;
      
      const d = distance(this, other);
      if (d === 0) continue;
      if (d < other.territory * (1 - Math.min(1, other.satiety/other.maxSatiety)) && d < other.vision && d < this.vision) threats.push(other);
    }

    if (this === selectedAgent) {
      for (const t of threats) {
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(t.x, t.y);
        ctx.strokeStyle = `rgba(200, 120, 120, ${t.type === "agent"? 0.5 + 0.2 * Math.min(t.vision, t.territory) / distance(this, t) : 0.5 + 0.2 * t.radius / distance(this, t)})`;
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    }
//===================找威脅結尾===================//
//
//
//=====================狀態機=====================//
  if (this.satiety/this.maxSatiety > 5/6 && this.age >= 3 && this.cooldown <= 0) this.mode = "mate";
  else if (this.satiety/this.maxSatiety < 2/3 || this.age <3) this.mode = "eat";
//===================狀態機結尾===================//
//
//
    let target = null;
//=====================找食物=====================//
    if (this.mode === "eat") {
      let mostValue = -1;
      for (const f of [...agents, ...foods]) {
        const d = distance(this, f);
        if (f.species && f.species === this.species) continue;
	if (f.territory && f.territory > this.territory) continue;
        if (this.vision < d) continue;
        if (f.mass && f.mass > this.mass * 5) continue;
        
        let guarded = false;
        if (guarded) continue;
          
        let v = 0;
        const nutrition = (f.type === "food")? (1 - this.hunt)*f.last : this.hunt*f.satiety;
        if (f.type==="food") v = nutrition / d;
        if (f.type==="agent") v = nutrition / d * (this.speed-f.speed);
	if (v < 0 || v <= mostValue) continue;
        if (v > mostValue) {
          target = f;
          mostValue = v;
        } else continue;
      }
//===================找食物結尾===================//
//
//
//=====================找交配=====================//
    } else if (this.mode === "mate") {
      let mostClose = null;
      for (const partner of agents) {
        if (partner === this) continue;
        if (partner.target === this && partner.mode === "eat") continue; 
        if (distance(this, partner) > this.vision) continue;
        if (partner.mode !== "mate") continue; // 只找同樣在交配模式
        if (this.species !== partner.species && this.parentSpecies1 !== partner.species && this.parentSpecies2 !== partner.species) continue; //新物種可以跨物種

        const d = distance(this, partner);
        if (mostClose === null || d < mostClose) {
          target = partner;
          mostClose = d;
        } else continue;
      }
    }
//===================找交配結尾===================//
//
//
//======================遊蕩======================//
    if (!target && !this.target && this.lastTarget && this.heat/this.maxHeat < 1/3 && this.satiety > this.maxSatiety/2) {
      this.target = {
        x: this.lastTarget.x,
        y: this.lastTarget.y,
        z: this.lastTarget.z,
        type: "wander",
        radius: 5,
      }
    } else if (!target && !this.target && !this.lastTarget && this.heat/this.maxHeat < 1/3 && this.satiety > this.maxSatiety/2) {
      this.target = {
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        z: this.minZ + Math.random() * (this.maxZ - this.minZ),
        type: "wander",
        radius: 5,
      }
    } else if (!this.target || this.target.type !== "wander") this.target = target;
//====================遊蕩結尾====================//
//
//
    this.direction(threats, this.target);
  }
//====================決定方向====================//
  direction(threats = [], target = null) {
    let ex = 0;
    let ey = 0;
    let ez = 0;
    if (target) {
      if (target.type === "wander" && (this.heat/this.maxHeat > 0.5 || this.satiety < this.maxSatiety * 1/3)) {
        this.target = null;
        const drag = 0.05;
        this.vx *= 1 - drag;
        this.vy *= 1 - drag;
        this.vz *= 1 - drag;
        this.move(null, this.vx, this.vy, this.vz);
        return;
      }
      if (target.type === "wander") this.speedFactor /= 2;
      const d = distance(this, target);
      const dx = (target.x - this.x);
      const dy = (target.y - this.y);
      const dz = (target.z - this.z);
      const d2D = Math.max(1, Math.hypot(dx, dy));
      const angle = Math.atan2(dy, dx);
      ex += d2D*Math.cos(angle)/d/d;
      ey += d2D*Math.sin(angle)/d/d;
      ez += dz/d/d;
    }

    if (threats.length !== 0) {
      if (this.target && this.target.type === "wander") this.target = null;
      for (const t of threats) {
        const d = distance(this, t);
        const dx = this.x - t.x;
        const dy = this.y - t.y;
        if (this.target) {
          const fx = (this.x - this.target.x);
          const fy = (this.y - this.target.y);
          const cross = fx * dy - fy * dx;
          const dot = fx * dx + fy * dy;
          let tx = cross >= 0? -dy : dy;
          let ty = cross >= 0? dx : -dx;
          if (dot > 0) {
            ex += (tx * Math.min(0.9, d / (Math.min(t.vision, t.territory) + this.radius)) + dx * Math.max(0.1, 1- d / (Math.min(t.vision, t.territory) + this.radius)))/d/d;
            ey += (ty * Math.min(0.9, d / (Math.min(t.vision, t.territory) + this.radius)) + dy * Math.max(0.1, 1- d / (Math.min(t.vision, t.territory) + this.radius)))/d/d;
          } else {
            ex += dx/d/d;
            ey += dy/d/d;
          } 
        } else {
          this.target = null;
          ex += dx/d/d;
          ey += dy/d/d;
        }
      }
    }
    
    if (ex !== 0 || ey !== 0 || ez !== 0) {
      this.vx += ex / Math.hypot(ex, ey, ez) * this.speed * this.speedFactor * this.heightFactor;
      this.vy += ey / Math.hypot(ex, ey, ez) * this.speed * this.speedFactor * this.heightFactor;
      this.vz += ez / Math.hypot(ex, ey, ez) * this.speed * this.speedFactor * this.heightFactor;
    }
    const drag = (this.target || threats.length > 0)? 0.05 : 0.05 * (1 + this.attributes.agility/this.attributes.strength);
    this.vx *= 1 - drag;
    this.vy *= 1 - drag;
    this.vz *= 1 - drag;
    this.move(target, this.vx, this.vy, this.vz);
  }
//==================決定方向結尾==================//
//
//
//===========================================點點眼腦結尾===========================================//
//
//
//=============================================點點身體=============================================//
//
//
//======================移動======================//
  move(target=null, vx, vy, vz) {
    if (target) {
      const d = distance(this, target);
      if (d <= this.radius + target.radius || d === 0) {
        if (this.mode === "eat" && target.type !== "wander") this.eat(target);
        if (this.mode === "mate" && target.type !== "wander") this.mate(target);
        this.target = null;
        this.lastTarget = null;
      }
    }
    this.lastX = this.x;
    this.lastY = this.y;
    this.lastZ = this.z;
    this.x += vx;
    this.y += vy;
    this.z += vz;

  }
//====================移動結尾====================//
//
//
//=======================吃=======================//
  eat(food) {
    if (food.type === "food") {
      let bite = Math.max(0, this.maxSatiety - this.satiety);
      this.satiety += 1.2 * (1-this.hunt) * Math.min(food.last * food.nutrition, bite);
      food.last -= Math.max(0, Math.min(food.last, bite / food.nutrition));
      food.radius = ((food.last / 4.21) ** 1/3) * 2.08;
      this.target = null;
    }
    if (food.type === "agent") {
      this.target = null;
      this.satiety += 1.2 * this.hunt*food.satiety;
      food.ate = true;
      this.hunted = true;
    }
  }
//=====================吃結尾=====================//
//
//
//======================交配======================//
  mate(partner) {
    this.cooldown = 0.5 + this.maxAge / 100;
    partner.cooldown = 0.5 + partner.maxAge / 100;
    this.satiety -= this.maxSatiety * 0.1;
    partner.satiety -= partner.maxSatiety * 0.1;
    this.mode = "eat";
    partner.mode = "eat";
    this.target = null;
    partner.target = null;
    const father = this.attributes;
    const mother = partner.attributes;
    const mutation = [1, 1, 1, 1, 1];
    for (let i= 0; i<mutation.length; i++) {
      while (true) {
        let r = Math.random();
        let value = random(-1, 1);
        let p = -value*value+1;
        if (r<p) {
          mutation[i] = 1+value;
          break;
        }
      }
    }
    let childAttrs = null;
    if (father && mother) {
      childAttrs = {
        strength: (father.strength + mother.strength) * 0.5 * mutation[0],
        intelligence: (father.intelligence + mother.intelligence) * 0.5 * mutation[1],
        agility: (father.agility + mother.agility) * 0.5 * mutation[2],
        endurance: (father.endurance + mother.endurance) * 0.5 * mutation[3],
      }
    } else return;

    if (agents.length + eggs.length > MAX_AGENTS) return;
    const child = new Egg({
      x: this.x + random(-15, 15),
      y: this.y + random(-15, 15),
      z: this.z + random(-15, 15),
      attributes: childAttrs,
      hunt: Math.min(0.99, Math.max(0.01, (this.hunt+partner.hunt) * 0.5 * mutation[4])),
      parents: [this, partner],
      parentSpecies1: this.species,
      parentSpecies2: partner.species,
    });
    eggs.push(child);
  }
//====================交配結尾====================//
//
//
//===========================================點點身體結尾===========================================//
//
//
//=============================================點點受肉=============================================//
//
//
  draw() {
//====================點點本體====================//
    if (this.x && this.y && this.radius) {
      ctx.beginPath();
      ctx.arc(this.x + this.shakeX, this.y + this.shakeY, this.radius, 0, Math.PI * 2);

      let sat = 30 + 30 * Math.min(1, this.satiety / this.maxSatiety);
      let light = 25 + 55 * Math.min(1, this.satiety / this.maxSatiety);
      let breath = 5.08 * Math.sin(this.age * 5.08);

      ctx.fillStyle = `hsl(${normalHue}, ${sat/60*normalSaturate}%, ${light/80*normalBright + breath}%)`;
      if (this.hunted) ctx.fillStyle = `hsl(${huntHue}, ${sat/60*huntSaturate}%, ${light/80*huntBright + breath}%)`;
      ctx.fill();
    } else console.log ("thisFalse");
//==================點點本體結尾==================//
//
//
//====================點點注視====================//
//點點框
    if (this === selectedAgent) {
      ctx.beginPath();
      ctx.arc(this.x + this.shakeX, this.y + this.shakeY, this.radius + 2, 0, Math.PI * 2);

      ctx.strokeStyle = "yellow";
      ctx.lineWidth = 2;
      ctx.stroke();
    }

//點點目標
    if (this.target  && this === selectedAgent && this.target.x && this.target.y && (this.target.type === "wander" || foods.includes(this.target) || agents.includes(this.target))) {
      ctx.beginPath();
      ctx.moveTo(this.x, this.y);
      ctx.lineTo(this.target.x, this.target.y);
      ctx.strokeStyle = (this.mode === "eat")? "#6f6" : (this.mode === "escape")? "#ffcc00" : (this.target.type ==="wander")? "white" : "#f6f";
      ctx.lineWidth = 1;
      ctx.stroke();
    } else if (this.target && (!this.target.x || !this.target.y)) console.log ("targetFalse");

    if (this === selectedAgent) {
//點點領地
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.territory * (1 - Math.min(1, this.satiety / this.maxSatiety)), 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255,180,180,0.2)';
      ctx.stroke();

//點點視野
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.vision, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(180,255,180,0.2)';
      ctx.stroke();
    }
//==================點點注視結尾==================//
//
//
//====================點點種族====================//
    ctx.strokeStyle = `rgba(0,0,0,${0.208 + this.heat * 0.792 / 120})`;//深度隨熱度變化
    ctx.lineWidth = 0.5;

    const r = this.radius;
    const x = this.x + this.shakeX;
    const y = this.y + this.shakeY;
  // 飛行：同心三角形
    if (this.maxZ > 0.5 * canvasZ) {
      drawFly(ctx, x, y, r * 0.45);
    }

  // 遁地：正方形
    if (this.minZ < -0.5 * canvasZ) {
      drawDig(ctx, x, y, r * 0.45);
    }

  // 游泳：波浪曲線
    if (this.abilities.swim) {
      drawSwim(ctx, x, y + r * 0.5, r * 0.7);
      drawSwim(ctx, x, y - r * 0.5, r * 0.7);
    }

  // 無：圓圈
    if (this.maxZ <= 0.5 * canvasZ && this.minZ >= -0.5 * canvasZ && !this.abilities.swim) {
      ctx.beginPath();
      ctx.arc(x, y, 0.5 * r, 0, Math.PI * 2);
      let hue = Math.min(120, this.satiety);
      ctx.stroke();
    }
//==================點點種族結尾==================//
//
//
  }
//===========================================點點受肉結尾===========================================//
//
//
}
//===============================================================================================點點結尾===============================================================================================//
function isThreatAgent(agent, other) {

  if (other.hunt > agent.hunt && other.target === agent && other.mode === "eat") return true;
  if (other.mode === "mate" && other.target === agent) return false;

//物理限制
  if (other === agent) return false;

//行為限制
  if (other.hunt < agent.hunt) return false;
  if (other.mass / agent.mass >= Math.max(1, other.maxSatiety/other.satiety) && other.mode !== "eat") return false;

//領地比較
  if (other.territory <= agent.territory) return false;

  return true;
}

class Deadagent {
//============================================死點點生成============================================//
  constructor(a={}) {
    this.x = a.x*1;
    this.y = a.y*1;
    this.abilities = a.abilities;
    this.maxZ = a.maxZ*1;
    this.minZ = a.minZ*1;
    this.radius = a.radius*1;
    this.vx = a.vx*1;
    this.vy = a.vy*1;
    let sat = 30 + 30 * Math.min(1, a.satiety / a.maxSatiety);
    let light = 25 + 55 * Math.min(1, a.satiety / a.maxSatiety);
    let breath = 5.08 * Math.sin(a.age * 5.08);
    this.color = a.hunted? [huntHue, sat/60*huntSaturate, light/80*huntBright + breath, 1] : [normalHue, sat/60*normalSaturate, light/80*normalBright + breath, 1];
    this.originColor = a.hunted? [huntHue, sat/60*huntSaturate, light/80*huntBright + breath, 1] : [normalHue, sat/60*normalSaturate, light/80*normalBright + breath, 1];
    this.hunted = a.hunted;
    this.COD = a.COD;
    this.timer = 0;
  }
//==========================================死點點生成結尾==========================================//
//
//
//============================================死點點時間============================================//
  update () {
    if (this.COD === "eat") {
      for (let i=0; i<Math.floor(Math.random()*9); i++) {
        spawnParticle("blood", this.x, this.y, {
          x: 0,
          y: 0,
        });
      }
      return true;
    }
    if (this.COD === "hunger") {
      this.radius *= 0.99;
      this.timer ++;
      if (this.timer % 9 === 0) {
        spawnParticle("steam", this.x, this.y, {
          x: 0,
          y: 0,
        });
      }
      if (this.timer >= 60) return true;
    }
    if (this.COD === "hot") {
      this.color = [
        this.originColor[0]<180? this.originColor[0]*((60-this.timer)/60):this.originColor[0]+(360-this.originColor[0])*this.timer/60, 
        this.originColor[1]*((60-this.timer/3)/60), 
        this.originColor[2]*((60-this.timer/2)/60),
        this.originColor[3]*((60-this.timer/2)/60),
      ];
      this.timer ++;
      if (this.timer >= 60) return true;
    }
    if (this.COD === "cold") {
      this.color = [
        this.originColor[0]+(240-this.originColor[0])*this.timer/60, 
        this.originColor[1]*((60-this.timer/3)/60), 
        this.originColor[2]+(100-this.originColor[2])*this.timer/120,
        this.originColor[3]*((60-this.timer)/60),
      ];
      if (this.color[0] < 0) this.color[0]+=360;
      this.timer ++;
      if (this.timer >= 60) return true;
    }
    if (this.COD === "old") {
      this.color = [
        this.originColor[0], 
        this.originColor[1]*((120-this.timer)/120), 
        this.originColor[2]+(50-this.originColor[2])*this.timer/120,
        this.originColor[3]*((120-this.timer)/120),
      ];
      this.timer ++;
      if (this.timer >= 120) return true;
    }
    this.x+=this.vx;
    this.y+=this.vy;
    this.vx*=0.95;
    this.vy*=0.95;
  }
//==========================================死點點時間結尾==========================================//
//
//
//============================================死點點受肉============================================//
  draw() {
//====================點點本體====================//
    if (this.x && this.y && this.radius) {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${this.color[0]},${this.color[1]}%,${this.color[2]}%, ${this.color[3]})`;
      ctx.fill();
    } else console.log ("thisFalse");
//==================點點本體結尾==================//
//
//
//====================點點種族====================//
    ctx.strokeStyle = `rgba(0,0,0,0.208)`;//深度隨熱度變化
    ctx.lineWidth = 0.5;

    const r = this.radius;
    const x = this.x;
    const y = this.y;
  // 飛行：同心三角形
    if (this.maxZ > 0.5 * canvasZ) {
      drawFly(ctx, x, y, r * 0.45);
    }

  // 遁地：正方形
    if (this.minZ < -0.5 * canvasZ) {
      drawDig(ctx, x, y, r * 0.45);
    }

  // 游泳：波浪曲線
    if (this.abilities.swim) {
      drawSwim(ctx, x, y + r * 0.5, r * 0.7);
      drawSwim(ctx, x, y - r * 0.5, r * 0.7);
    }

  // 無：圓圈
    if (this.maxZ <= 0.5 * canvasZ && this.minZ >= -0.5 * canvasZ && !this.abilities.swim) {
      ctx.beginPath();
      ctx.arc(x, y, 0.5 * r, 0, Math.PI * 2);
      let hue = Math.min(120, this.satiety);
      ctx.stroke();
    }
//==================點點種族結尾==================//
  }
//==========================================死點點受肉結尾==========================================//
}

class Particle {
//===========================================粒子特效生成===========================================//
  constructor(opt){
    this.x = opt.x;
    this.y = opt.y;

    this.vx = opt.vx || 0;
    this.vy = opt.vy || 0;

    this.radius = opt.radius || 2;
    this.color = opt.color || "white";
    this.maxLife = opt.life || 30;
    this.life = opt.life || 30;
    this.type = opt.type;
  }
//=========================================粒子特效生成結尾=========================================//
//
//
//===========================================粒子特效時間===========================================//
  update(){
    this.x += this.vx;
    this.y += this.vy;

    this.vx *= 0.96;
    this.vy *= 0.96;

    this.life--;

    return this.life > 0;
  }
//=========================================粒子特效時間結尾=========================================//
//
//
//===========================================粒子特效受肉===========================================//
  draw(){
    ctx.fillStyle = `hsla(${this.color[0]}, ${this.color[1]}%, ${this.color[2]}%, ${this.color[3]*this.life/this.maxLife})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fill();
  }
//=========================================粒子特效受肉結尾=========================================//
//
//
}

function loadWorld() {
  const raw = localStorage.getItem("dianEvolutionSave");
  if (!raw) return false;

  infoShift.style.background = "transparent";
  infoDiv.style.display = "none";
  artControl.style.display = "none";

  const data = JSON.parse(raw);
  terrainInput.value = data.seed;
  normalHue = data.normalHue;
  normalSaturate = data.normalSaturate;
  normalBright = data.normalBright;

  huntHue = data.huntHue;
  huntSaturate = data.huntSaturate;
  huntBright = data.huntBright;

  terrainHue = data.terrainHue;
  terrainSaturate = data.terrainSaturate;
  terrainBright = data.terrainBright;

  agents.length = 0;
  foods.length = 0;
  eggs.length = 0;

  for (const a of data.agents) {
    agents.push(new Agent(a)); 
  }
  selectedAgent = agents.find(a => a.id === data.selectedAgentId) || null;
  for (const a of agents) {
    let parentsId = data.agents.find(da => da.id === a.id)?.parents;
    if (!parentsId || !parentsId[0] || !parentsId[1]) {
      a.parents = [{}, {}];
      continue;
    }
    a.parents = [agents.find(pa => pa.id === parentsId[0]), agents.find(pa => pa.id === parentsId[1])];
  }

  for (const f of data.foods) {
    foods.push(new Food(f));
  }

  for (const e of data.eggs) {
    eggs.push(new Egg(e));
  }
  return true;
}

  canvas.addEventListener('mousedown', (e) => {
    const y= Math.min(50,Math.max(0, 55-e.offsetY));
    if (canvas.id === "草食") {normalBright = y*2; normalDemoPhase = 0;}
    if (canvas.id === "肉食") {huntBright = y*2; huntDemoPhase = 0;}
    if (canvas.id === "地形") {
      terrainBright = y*2;
      let n = 0;
      for (const ch of terrainInput.value) n += ch.codePointAt(0);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctxTerrain.clearRect(0, 0, canvasTerrain.width, canvasTerrain.height);

      const cell = 1;
      for (let x = 0.1; x < canvasTerrain.width; x += cell) {
        for (let y = 0.1; y < canvasTerrain.height; y += cell) {
          const terrainZ = noise(x * scale, y * scale, terrainInput.value);
          ctxTerrain.fillStyle = `hsl(${terrainHue}, ${terrainZ * terrainSaturate}%, ${terrainZ * terrainBright}%)`;
          ctxTerrain.fillRect(x, y, cell, cell);
        }
      }
    }
    drawColorRing();
    drawBrightBar();
    drawSaturateBar();
  });
});

//滑鼠移動
canvas.addEventListener("mousemove", e => {
  mouseDot.x = e.offsetX;
  mouseDot.y = e.offsetY;
});
//==================操作按鍵結尾==================//
//
//
//====================操作介面====================//
let normalDemoPhase = 0;
let huntDemoPhase = 0;
let terrainDemoPhase = 0.5*Math.PI;
//色環
function drawColorRing() {
  document.querySelectorAll('.colorRing').forEach(canvas => {
    canvas.width = 54;
    canvas.height = 54;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i=0; i<360; i++) {
      const start = (i-1)*Math.PI/180;
      const end = i*Math.PI/180;
      ctx.beginPath();
      if (canvas.id === "草食") ctx.strokeStyle = `hsl(${i},${normalSaturate}%,${normalBright}%)`;
      if (canvas.id === "肉食") ctx.strokeStyle = `hsl(${i},${huntSaturate}%,${huntBright}%)`;
      if (canvas.id === "地形") ctx.strokeStyle = `hsl(${i},${terrainSaturate}%,${terrainBright}%)`;
      ctx.lineWidth = 5;
      ctx.arc(27, 27, 22, start, end);
      ctx.stroke();
    }
    ctx.beginPath();
    
    let angle = 0;
    if (canvas.id === "草食") {
      angle = normalHue/180*Math.PI;
      ctx.fillStyle = `hsl(${normalHue},${normalSaturate}%,${normalBright}%)`;
    }
    if (canvas.id === "肉食") {
      angle = huntHue/180*Math.PI;
      ctx.fillStyle = `hsl(${huntHue},${huntSaturate}%,${huntBright}%)`;
    }
    if (canvas.id === "地形") {
      angle = terrainHue/180*Math.PI;
      ctx.fillStyle = `hsl(${terrainHue},${terrainSaturate}%,${terrainBright}%)`;
    }
    ctx.arc(27 + 22 * Math.cos(angle), 27 + 22 * Math.sin(angle), 5, 0, 2*Math.PI);
    ctx.fill();
  });
}
drawColorRing();

//demo點點
function drawDemoDian() {
  document.querySelectorAll('.colorRing').forEach(canvas => {
    const ctx = canvas.getContext('2d');
    ctx.beginPath();
    ctx.clearRect(15, 15, canvas.width-30, canvas.height-30);
    if (canvas.id === "草食") ctx.fillStyle = `hsl(${normalHue},${normalSaturate*(0.5+0.25*(Math.sin(normalDemoPhase)+1))}%,${normalBright*(0.5+0.25*(Math.sin(normalDemoPhase)+1))}%)`;
    if (canvas.id === "肉食") ctx.fillStyle = `hsl(${huntHue},${huntSaturate*(0.5+0.25*(Math.sin(huntDemoPhase)+1))}%,${huntBright*(0.5+0.25*(Math.sin(huntDemoPhase)+1))}%)`;
    ctx.arc(27, 27, 10, 0, 2*Math.PI);
    ctx.fill();

    if (canvas.id !== "地形") {
      ctx.beginPath();
      ctx.strokeStyle = "hsla(0, 0%, 0%, 0.2)";
      ctx.lineWidth = 1;
      ctx.arc(27, 27, 7, 0, 2*Math.PI);
      ctx.stroke();

      ctx.beginPath();
      ctx.strokeStyle = "hsla(0, 0%, 0%, 0.1)";
      ctx.lineWidth = 3;
      ctx.arc(27, 27, 6, 0, 2*Math.PI);
      ctx.stroke();
    }

    if (canvas.id === "地形") {
      for (y = 20; y > 0; y--) {
        ctx.beginPath();
        ctx.strokeStyle = `hsl(${terrainHue},${y/20*terrainSaturate}%,${y/20*terrainBright}%)`;
        ctx.lineWidth = 1;
        ctx.moveTo(27+10*Math.cos((y/20-0.5)*Math.PI), 27+10*Math.sin((y/20-0.5)*Math.PI));
        ctx.lineTo(27-10*Math.cos((y/20-0.5)*Math.PI), 27+10*Math.sin((y/20-0.5)*Math.PI)); 
        ctx.stroke();
      }
    }
  });
}
drawDemoDian();

//亮度條
function drawBrightBar () {
  document.querySelectorAll('.brightBar').forEach(canvas => {
    canvas.width = 10;
    canvas.height = 60;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i=5; i<55; i++) {
      const start = i-1;
      const end = i;
      ctx.beginPath();
      ctx.moveTo(5,start);
      ctx.lineTo(5,end);
      if (canvas.id === "草食") ctx.strokeStyle = `hsl(${normalHue},${normalSaturate}%,${100-i*2}%)`;
      if (canvas.id === "肉食") ctx.strokeStyle = `hsl(${huntHue},${huntSaturate}%,${100-i*2}%)`;
      if (canvas.id === "地形") ctx.strokeStyle = `hsl(${terrainHue},${terrainSaturate}%,${100-i*2}%)`;
      ctx.lineWidth = 5;
      ctx.stroke();
    }

    ctx.beginPath();
    let y = 0;
    if (canvas.id === "草食") {
      y = 55-normalBright/2;
      ctx.fillStyle = `hsl(${normalHue},${normalSaturate}%,${normalBright}%)`;
    }
    if (canvas.id === "肉食") {
      y = 55-huntBright/2;
      ctx.fillStyle = `hsl(${huntHue},${huntSaturate}%,${huntBright}%)`;
    }
    if (canvas.id === "地形") {
      y = 55-terrainBright/2;
      ctx.fillStyle = `hsl(${terrainHue},${terrainSaturate}%,${terrainBright}%)`;
    }
    ctx.arc(5, y, 5, 0, 2*Math.PI);
    ctx.fill();
    
  });
}
drawBrightBar();



//飽和條
function drawSaturateBar() {
  document.querySelectorAll('.saturateBar').forEach(canvas => {
    canvas.width = 10;
    canvas.height = 60;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i=5; i<55; i++) {
      const start = i-1;
      const end = i;
      ctx.beginPath();
      ctx.moveTo(5,start);
      ctx.lineTo(5,end);
      if (canvas.id === "草食") ctx.strokeStyle = `hsl(${normalHue},${100-i*2}%,${normalBright}%)`;
      if (canvas.id === "肉食") ctx.strokeStyle = `hsl(${huntHue},${100-i*2}%,${huntBright}%)`;
      if (canvas.id === "地形") ctx.strokeStyle = `hsl(${terrainHue},${100-i*2}%,${terrainBright}%)`;
      ctx.lineWidth = 5;
      ctx.stroke();
    }

    ctx.beginPath();
    let y = 0;
    if (canvas.id === "草食") {
      y = 55-normalSaturate/2;
      ctx.fillStyle = `hsl(${normalHue},${normalSaturate}%,${normalBright}%)`;
    }
    if (canvas.id === "肉食") {
      y = 55-huntSaturate/2;
      ctx.fillStyle = `hsl(${huntHue},${huntSaturate}%,${huntBright}%)`;
    }
    if (canvas.id === "地形") {
      y = 55-terrainSaturate/2;
      ctx.fillStyle = `hsl(${terrainHue},${terrainSaturate}%,${terrainBright}%)`;
    }
    ctx.arc(5, y, 5, 0, 2*Math.PI);
    ctx.fill();
  });
}
drawSaturateBar();
//==================操作介面結尾==================//
//
//
//=============================================操作結尾=============================================//
//
//
//==============================================================================================創世紀結尾==============================================================================================//
//
//
//===============================================================================================世界時間===============================================================================================//
let lastTime = 0;
const FRAME_INTERVAL = 1000 / frame; //fps
function loop(timestamp) {
  if (timestamp - lastTime < FRAME_INTERVAL) {
    requestAnimationFrame(loop);
    return; // 跳過這次更新
  }
  normalDemoPhase = normalDemoPhase + 0.05;
  huntDemoPhase = huntDemoPhase + 0.05;
  drawDemoDian();

  lastTime = timestamp;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 維持點點數量
  if (agents.length + eggs.length <= 5 && foods.length >= 40) {
    for (let i = 0; i < MAX_AGENTS/2; i++) {
      agents.push(new Agent({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      z: (Math.random() - 0.5) * 2 * canvasZ,
      }));
    }
  }
  
  // 隨機生成食物
  if (Math.random() < 0.02 + (foods.length/FOOD_COUNT)*0.3 && foods.length < FOOD_COUNT) {
    foods.push(new Food({x: Math.random() * canvas.width, y: Math.random() * canvas.height }));
  }

  // 更新食物
  for (let i = foods.length - 1; i >= 0; i--) {
    const f = foods[i];
    f.age++; 
    if (f.age >= f.maxAge || f.last <= 0) {
      foods.splice(i, 1);
      continue;
    }
    if (!selectedAgent) f.draw();
    if (selectedAgent && distance(selectedAgent, f) <= selectedAgent.vision) f.draw();
  }

//更新點點
  for (let i = agents.length - 1; i >= 0; i--) {
    const alive = agents[i].update();
    if (!alive) {
      deadagents.push(new Deadagent(agents[i]));
      agents.splice(i, 1);
    }
  }


//更新死點點
  for (let i = deadagents.length - 1; i >= 0; i--) {
    const over = deadagents[i].update();
    if (over) {
      deadagents.splice(i, 1);
    } else {
      deadagents[i].draw();
    }
  }

//更新粒子
  for(let i = particles.length - 1; i >= 0; i--){
    if(!particles[i].update()){
      particles.splice(i, 1);
    } else particles[i].draw();
  }
  
//更新蛋蛋
  for (let i = eggs.length - 1; i >= 0; i--) {
    const egg = eggs[i].update();
    if (egg === "born") eggs.splice(i, 1);
  }

//滑鼠
ctx.beginPath();
ctx.arc(mouseDot.x, mouseDot.y, mouseDot.r, 0, Math.PI * 2);
ctx.fillStyle = `hsl(${normalHue}, ${0.5*normalSaturate}%, ${0.5*normalBright}%)`;
ctx.fill();

//點點監視器  
  if (infoDiv.style.display === "block") {
    infoDiv.innerHTML = `<b>生存點點狀態${agents.length}+${eggs.length}/${Math.floor(MAX_AGENTS)+1} ${foods.length}/${Math.floor(FOOD_COUNT)+1}</b><br><br>`;
    agents.forEach((a, i)=> {
      const isMax = i === MAX_AGENTS - eggs.length - 1;
      const color = isMax? "red" : a===selectedAgent? "yellow" : "inherit";

      let height = [ "-", "-", "-", "-", "-", "-", "-", "-", "-", "-", "-", "-", "-", "-", "-", "-", "-", "-", "-", "-", "-" ];
      const minZ = Math.min(20, Math.max(0, Math.round((1 + a.minZ/canvasZ)*10)));
      const maxZ = Math.min(20, Math.max(0, Math.round((1 + a.maxZ/canvasZ)*10)));
      const nowZ = Math.min(20, Math.max(0, Math.round((1 + a.z/canvasZ)*10)));
      height[minZ] = "|";
      height[maxZ] = "|";
      if (maxZ === minZ) height[minZ] = "x";
      if (nowZ === minZ || nowZ === maxZ) {
        height[nowZ] = "x";
      } else {
        height[nowZ] = "o";
      }
      const heightDisplay = height.join("");
 
      infoDiv.innerHTML += 
        `<span style = "color:${color}"
          onpointerdown = "
            selectedAgent = (selectedAgent ===agents[${i}])? null : agents[${i}];
            console.log(selectedAgent);
        ">

        ${a.species}` +  
        ` ${heightDisplay} ` + 
        `${Math.round(a.attributes.strength)} ${Math.round(a.attributes.intelligence)} ${Math.round(a.attributes.agility)} ${Math.round(a.attributes.endurance)}` + 
        `-${Math.round((a.satiety/a.maxSatiety).toFixed(3)*100)}%` + 
        `.${Math.round(a.age)}/${Math.round(a.maxAge)}` + 
        `</span><br>`;
    });

//點點統計
    const c = document.createElement('canvas');
    c.id = 'foodStatistic';
    c.width = 200;
    c.height = 50;
    infoDiv.appendChild(c);
    const ctxFood = c.getContext('2d');

    ctxFood.beginPath();
    ctxFood.strokeStyle = "white";
    ctxFood.moveTo(40, 10);
    ctxFood.lineTo(40, 50);
    ctxFood.moveTo(40, 50);
    ctxFood.lineTo(200, 50);
    ctxFood.moveTo(200, 50);
    ctxFood.lineTo(200, 10);
    ctxFood.moveTo(200, 10);
    ctxFood.lineTo(40, 10);
    ctxFood.lineWidth = 1;
    ctxFood.stroke();

    const foodY = [];
    const agentY = [];
    let maxCount = 0;
    for (let i=0; i<21; i++) {
      let x = (i-10)/10;
      let nextX = (i-9)/10;
      let count = foods.filter(f => f.z >= x*canvasZ && f.z < nextX*canvasZ).length;
      foodY.push(count);
      if (count > maxCount) maxCount = count;
    }
    for (let i=0; i<21; i++) {
      let x = (i-10)/10;
      let nextX = (i-9)/10;
      let count = agents.filter(a => a.z >= x*canvasZ && a.z < nextX*canvasZ).length;
      agentY.push(count);
      if (count > maxCount) maxCount = count;
    }

    for (let i=0; i<21; i++) {
      let x = i/21;
      const Y = (1-foodY[i]/maxCount)*40;
      const aY = (1-agentY[i]/maxCount)*40;
      ctxFood.beginPath();
      ctxFood.fillStyle = "white";
      ctxFood.fillRect(x*160+40,Y+10, 8,40-Y);
      ctxFood.beginPath();
      ctxFood.fillStyle = `hsla(${normalHue},${normalSaturate}%,${normalBright}%, 0.7)`;
      ctxFood.fillRect(x*160+40,aY+10, 8,40-aY);
    }
    ctxFood.fillStyle = "white";
    ctxFood.font = "14px monospace"; 
    ctxFood.fillText("FOOD", 0, 25); 
    ctxFood.fillStyle = `hsl(${normalHue},${normalSaturate}%,${normalBright}%)`;
    ctxFood.fillText("DIAN", 0, 45); 
  }

  

  requestAnimationFrame(loop);
}
loop();
//=============================================================================================世界時間結尾=============================================================================================//
</script>
